com.ampp:
  business-validation-override:
    - full-class-name: com.example.validatingforminput.PersonForm
      fields:
        - field-name: name
          constraints:
            not-null:
              value: true
            not-blank:
              value: true
            size:
              min:
                value: 20
              max:
                value: 30
        - field-name: age
          constraints:
            not-null:
              value: true
            min:
              value: 20
            max:
              value: 60
        - field-name: salary
          constraints:
            decimal-min:
              value: 1000.1
              inclusive: false
            decimal-max:
              value: 250000.00
